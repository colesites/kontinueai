<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/kontinueai-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontinue</title>
    <style>
      /* Kill the white flash before the bundle CSS loads. */
      html,
      body,
      #root {
        margin: 0;
        height: 100%;
        background: #0b0a0c;
      }

      /* Branded splash shown until React mounts. */
      #splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 22px;
        background: #0b0a0c;
        transition: opacity 0.35s ease;
      }
      #splash.hide {
        opacity: 0;
        pointer-events: none;
      }
      #splash img {
        width: 168px;
        height: auto;
        /* Monochrome white wordmark on the dark splash. */
        filter: brightness(0) invert(1);
        opacity: 0.92;
      }
      #splash .dots {
        display: flex;
        gap: 6px;
      }
      #splash .dots span {
        width: 6px;
        height: 6px;
        border-radius: 9999px;
        background: #ec2d96;
        animation: splash-bounce 1s infinite ease-in-out;
      }
      #splash .dots span:nth-child(2) {
        animation-delay: 0.15s;
      }
      #splash .dots span:nth-child(3) {
        animation-delay: 0.3s;
      }
      @keyframes splash-bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }
    </style>
  </head>

  <body>
    <div id="splash">
      <img src="/kontinueai.svg" alt="Kontinue" />
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
